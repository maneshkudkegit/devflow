version: "3.9"

services:
  # ── PostgreSQL database ──
  db:
    image: postgres:16-alpine
    container_name: devflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
      POSTGRES_DB: devflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──
  backend:
    build: ./backend
    container_name: devflow-backend
    restart: unless-stopped
    ports:
      - "80:8000"   # 🔥 PUBLIC ACCESS HERE
    environment:
      DATABASE_URL: postgresql://devflow:devflow@db:5432/devflow
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend ──
  frontend:
    build: ./frontend
    container_name: devflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"   # optional (for testing UI separately)
    depends_on:
      - backend

volumes:
  pgdata: